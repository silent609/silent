<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>silent.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }

  #universe {
    position: fixed;
    inset: 0;
    background: #000;
    cursor: none;
  }

  canvas#bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #cursor-glow {
    position: absolute;
    width: 320px; height: 320px;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 45%, transparent 70%);
    z-index: 2;
    mix-blend-mode: screen;
    transition: opacity 0.4s;
  }

  #cursor-dot {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.92);
    pointer-events: none;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 8px 3px rgba(255,255,255,0.4), 0 0 22px 7px rgba(255,255,255,0.1);
    z-index: 10;
    transition: opacity 0.4s;
  }

  #center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 5;
    pointer-events: none;
    user-select: none;
  }

  #word-silence {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(90px, 16vw, 160px);
    letter-spacing: 0.25em;
    line-height: 1;
    color: rgba(255,255,255,0.90);
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.22)) drop-shadow(0 0 70px rgba(255,255,255,0.07));
    animation: breathe 5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%,100% {
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.18)) drop-shadow(0 0 70px rgba(255,255,255,0.05));
      opacity: 0.88;
    }
    50% {
      filter: drop-shadow(0 0 45px rgba(255,255,255,0.38)) drop-shadow(0 0 110px rgba(255,255,255,0.12));
      opacity: 1;
    }
  }

  #domain {
    font-family: 'Space Mono', monospace;
    font-size: clamp(11px, 1.4vw, 15px);
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.22);
    margin-top: 18px;
    text-transform: lowercase;
    animation: fade-in-up 3s ease 1.2s both;
  }

  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .spark {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
    animation: sfade 0.9s ease-out forwards;
  }

  @keyframes sfade {
    0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
    100% { transform: translate(-50%,-50%) scale(2); opacity: 0; }
  }

  #corner-tl, #corner-tr, #corner-bl, #corner-br {
    position: absolute;
    width: 36px; height: 36px;
    z-index: 6;
    pointer-events: none;
    opacity: 0.14;
    animation: fade-in-up 3.5s ease 2s both;
  }
  #corner-tl { top: 28px; left: 28px; border-top: 1px solid #fff; border-left: 1px solid #fff; }
  #corner-tr { top: 28px; right: 28px; border-top: 1px solid #fff; border-right: 1px solid #fff; }
  #corner-bl { bottom: 28px; left: 28px; border-bottom: 1px solid #fff; border-left: 1px solid #fff; }
  #corner-br { bottom: 28px; right: 28px; border-bottom: 1px solid #fff; border-right: 1px solid #fff; }

  #vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.78) 100%);
    z-index: 4;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="universe">
  <canvas id="bg"></canvas>
  <div id="cursor-glow"></div>
  <div id="cursor-dot"></div>
  <div id="center-text">
    <div id="word-silence">silent</div>
    <div id="domain">silent.org</div>
  </div>
  <div id="corner-tl"></div>
  <div id="corner-tr"></div>
  <div id="corner-bl"></div>
  <div id="corner-br"></div>
  <div id="vignette"></div>
</div>

<script>
const universe = document.getElementById('universe');
const canvas   = document.getElementById('bg');
const ctx      = canvas.getContext('2d');
const cursorGlow = document.getElementById('cursor-glow');
const cursorDot  = document.getElementById('cursor-dot');

let W, H, mx = -999, my = -999;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursorGlow.style.left = mx + 'px';
  cursorGlow.style.top  = my + 'px';
  cursorDot.style.left  = mx + 'px';
  cursorDot.style.top   = my + 'px';
  maybeSpawn(mx, my);
});
document.addEventListener('mouseleave', () => {
  cursorGlow.style.opacity = '0';
  cursorDot.style.opacity  = '0';
});
document.addEventListener('mouseenter', () => {
  cursorGlow.style.opacity = '1';
  cursorDot.style.opacity  = '1';
});

let spawnTimer = 0;
function maybeSpawn(x, y) {
  const now = Date.now();
  if (now - spawnTimer > 50) {
    spawnTimer = now;
    spawnSpark(x, y);
    for (let i = 0; i < 2; i++) addParticle(x, y);
  }
}

function spawnSpark(x, y) {
  const el = document.createElement('div');
  el.className = 'spark';
  const size  = 2 + Math.random() * 3;
  const alpha = 0.2 + Math.random() * 0.35;
  el.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;background:rgba(255,255,255,${alpha});box-shadow:0 0 ${size*3}px rgba(255,255,255,${alpha*0.5})`;
  universe.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

const particles = [];
function addParticle(x, y) {
  const angle = Math.random() * Math.PI * 2;
  const speed = 0.2 + Math.random() * 0.7;
  particles.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1,
    decay: 0.009 + Math.random() * 0.012,
    size: 1 + Math.random() * 1.8
  });
}

const snowflakes = [];
for (let i = 0; i < 160; i++) {
  snowflakes.push({
    x: Math.random(), y: Math.random(),
    r: 0.4 + Math.random() * 1.4,
    speed: 0.00012 + Math.random() * 0.00035,
    drift: (Math.random() - 0.5) * 0.00009,
    alpha: 0.06 + Math.random() * 0.26,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.004 + Math.random() * 0.012
  });
}

let t = 0;
let lx = -999, ly = -999; // smoothed line endpoint (follows mouse)

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  if (lx === -999) { lx = cx; ly = cy; }

  // Snow
  snowflakes.forEach(s => {
    s.y += s.speed;
    s.wobble += s.wobbleSpeed;
    s.x += s.drift + Math.sin(s.wobble) * 0.00006;
    if (s.y > 1) { s.y = -0.01; s.x = Math.random(); }
    if (s.x < 0) s.x = 1;
    if (s.x > 1) s.x = 0;
    const sx = s.x * W, sy = s.y * H;
    const d2m = Math.hypot(sx - mx, sy - my);
    const repel = Math.max(0, 1 - d2m / 80);
    const ang = Math.atan2(sy - my, sx - mx);
    ctx.beginPath();
    ctx.arc(sx + Math.cos(ang)*repel*16, sy + Math.sin(ang)*repel*7, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${s.alpha + repel * 0.22})`;
    ctx.fill();
  });

  // Mouse trail particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${p.life * 0.42})`;
    ctx.fill();
  }

  // 4 corner lines — each goes from its corner to the mouse position
  const mouseValid = mx > 0 && mx < W && my > 0 && my < H;

  // Smoothly lerp line endpoint toward mouse
  if (mouseValid) {
    lx += (mx - lx) * 0.08;
    ly += (my - ly) * 0.08;
  } else {
    lx += (cx - lx) * 0.04;
    ly += (cy - ly) * 0.04;
  }

  const corners = [
    { x: 0, y: 0 },
    { x: W, y: 0 },
    { x: 0, y: H },
    { x: W, y: H },
  ];

  corners.forEach((corner, i) => {
    const midX = (corner.x + lx) * 0.5;
    const midY = (corner.y + ly) * 0.5;
    const perp = (i % 2 === 0 ? 1 : -1) * Math.sin(t * 0.015 + i) * 18;
    const cpX = midX + perp;
    const cpY = midY - perp;

    const alpha = 0.09 + Math.sin(t * 0.025 + i * 0.9) * 0.03;

    ctx.beginPath();
    ctx.moveTo(corner.x, corner.y);
    ctx.quadraticCurveTo(cpX, cpY, lx, ly);
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = 0.7;
    ctx.stroke();
  });

  // Small dot at the meeting point
  ctx.beginPath();
  ctx.arc(lx, ly, 2, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,0.22)`;
  ctx.fill();

  // Center soft glow
  const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 100);
  cg.addColorStop(0, 'rgba(255,255,255,0.03)');
  cg.addColorStop(1, 'transparent');
  ctx.fillStyle = cg;
  ctx.fillRect(0, 0, W, H);

  // Cursor halo
  if (mouseValid) {
    const mg = ctx.createRadialGradient(mx, my, 0, mx, my, 150);
    mg.addColorStop(0, 'rgba(255,255,255,0.032)');
    mg.addColorStop(1, 'transparent');
    ctx.fillStyle = mg;
    ctx.fillRect(0, 0, W, H);
  }

  t++;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
